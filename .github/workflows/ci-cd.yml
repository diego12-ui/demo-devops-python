name: CI/CD

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run static analysis
        run: ruff check .

      - name: Run tests with coverage
        run: |
          pytest --cov=api --cov=demo --cov-report=xml:coverage.xml

      - name: SonarQube analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: sonarsource/sonarcloud-github-action@v2
        continue-on-error: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml

      - name: Show coverage summary
        run: coverage report -m

  docker-build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker registry
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: devsu-demo-python:${{ github.sha }}

      - name: Push Docker image
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/devsu-demo-python:${{ github.sha }},docker.io/${{ secrets.DOCKERHUB_USERNAME }}/devsu-demo-python:latest

  deploy:
    needs: docker-build
    if: ${{ github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up kubectl
        uses: azure/setup-kubectl@v5

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        if: ${{ env.KUBE_CONFIG_DATA != '' }}
        run: |
          mkdir -p $HOME/.kube
          echo "$KUBE_CONFIG_DATA" | base64 --decode > $HOME/.kube/config

      - name: Ensure Traefik is installed
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        if: ${{ env.KUBE_CONFIG_DATA != '' }}
        run: |
          helm repo add traefik https://traefik.github.io/charts
          helm repo update
          kubectl create namespace traefik --dry-run=client -o yaml | kubectl apply -f -
          helm upgrade --install traefik traefik/traefik -n traefik \
            -f k8s/traefik-values.yaml --wait --timeout 5m

      - name: Deploy Kubernetes manifests
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        if: ${{ env.KUBE_CONFIG_DATA != '' }}
        run: |
          kubectl apply -k k8s
          if kubectl get crd verticalpodautoscalers.autoscaling.k8s.io >/dev/null 2>&1; then
            kubectl apply -f k8s/vpa.yaml
          else
            echo "VerticalPodAutoscaler CRD not available in this cluster; skipping VPA manifest."
          fi
          if kubectl get crd middlewares.traefik.io >/dev/null 2>&1; then
            kubectl apply -f k8s/middleware-redirect.yaml
          else
            echo "Traefik Middleware CRD not available in this cluster; skipping HTTPS-redirect middleware."
          fi