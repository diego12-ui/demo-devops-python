apiVersion: apps/v1
kind: Deployment
metadata:
  name: devsu-demo-python
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: devsu-demo-python
  template:
    metadata:
      labels:
        app: devsu-demo-python
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
      initContainers:
        # Espera a que PostgreSQL acepte conexiones antes de migrar
        - name: wait-for-db
          image: docker.io/osmardiego/devsu-demo-python:latest
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              until python -c "import socket,os; socket.create_connection((os.environ['DATABASE_HOST'], int(os.environ['DATABASE_PORT'])), timeout=2)"; do
                echo "waiting for postgres at $DATABASE_HOST:$DATABASE_PORT"; sleep 2;
              done
          envFrom:
            - configMapRef:
                name: devsu-demo-python-config
            - secretRef:
                name: devsu-demo-python-secret
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
        # Aplica las migraciones de Django
        - name: migrate
          image: docker.io/osmardiego/devsu-demo-python:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "manage.py", "migrate", "--noinput"]
          envFrom:
            - configMapRef:
                name: devsu-demo-python-config
            - secretRef:
                name: devsu-demo-python-secret
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
      containers:
        - name: web
          image: docker.io/osmardiego/devsu-demo-python:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          envFrom:
            - configMapRef:
                name: devsu-demo-python-config
            - secretRef:
                name: devsu-demo-python-secret
          startupProbe:
            httpGet:
              path: /api/health/
              port: 8000
              httpHeaders:
                - name: Host
                  value: localhost
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health/
              port: 8000
              httpHeaders:
                - name: Host
                  value: localhost
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health/
              port: 8000
              httpHeaders:
                - name: Host
                  value: localhost
            initialDelaySeconds: 15
            periodSeconds: 20