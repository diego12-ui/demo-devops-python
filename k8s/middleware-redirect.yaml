# OPCIONAL: fuerza el redirect de HTTP (web) a HTTPS (websecure).
# Requiere los CRDs de Traefik (se instalan con el chart oficial de Traefik).
# Para activarlo:
#   1) kubectl apply -f k8s/middleware-redirect.yaml -n devsu-demo-python
#   2) Añade esta annotation al Ingress (namespace-nombre@kubernetescrd):
#      traefik.ingress.kubernetes.io/router.middlewares: devsu-demo-python-https-redirect@kubernetescrd
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: https-redirect
spec:
  redirectScheme:
    scheme: https
    permanent: true
